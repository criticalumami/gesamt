name: Sync to Hugging Face
on:
  push:
    branches:
      - main
      - lean-rewrite

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://mzrxa:$HF_TOKEN@huggingface.co/spaces/mzrxa/gesamtkunstwerk HEAD:main
